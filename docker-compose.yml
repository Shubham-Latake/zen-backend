version: '3.8'

services:
  app:
    build: .
    container_name: zenapp-backend
    restart: always
    expose:
      - "3001"
    env_file:
      - .env

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
