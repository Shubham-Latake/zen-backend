version: '3.8'

# Local development only — Postgres runs in Docker, no nginx, no SSL
# Run with: docker-compose -f docker-compose.local.yml up --build
#
# Production: use docker-compose.yml (nginx + SSL + EC2 + Supabase)

services:

  postgres:
    image: postgres:16-alpine
    container_name: zenapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zenapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"             # 5433 on host → 5432 in container (avoids conflict with local Postgres)
    volumes:
      - postgres_data:/var/lib/postgresql/data    # Persist data between restarts
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql  # Auto-run on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zenapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: zenapp-backend-local
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point at the local postgres container
      DATABASE_URL: postgresql://postgres:password@postgres:5432/zenapp
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy   # Wait until Postgres is ready before starting app

volumes:
  postgres_data: